          <h1 style="font-size:2rem;margin-bottom:16px;">RAKSHA AI — Digital Public Safety Intelligence</h1>
          <p style="font-size:1.1rem;line-height:1.6;color:#a1a1aa;margin-bottom:24px;">AI-powered defense against digital arrest scams, counterfeiting, and fraud networks in India.</p>
          <h2 style="font-size:1.3rem;margin-top:32px;margin-bottom:12px;">Core Modules</h2>
          <ul style="line-height:2;color:#d4d4d8;">
            <li><strong>Digital Arrest Scam Detector</strong> — Real-time transcript analysis that flags impersonation scripts, urgency tactics, and money-transfer demands</li>
            <li><strong>Citizen Fraud Shield</strong> — Check any suspicious call or message in seconds</li>
            <li><strong>Counterfeit Currency Checker</strong> — RBI-standard security feature verification for ₹500 and ₹2000 notes</li>
            <li><strong>Safety Center</strong> — Emergency contacts, safety score, and personal protection tools</li>
            <li><strong>Live Scam Alerts</strong> — Real-time trending scam alerts and threat warnings across India</li>
            <li><strong>File NCRP Report</strong> — File complaints directly to NCRB/cybercrime.gov.in with auto-generated evidence packages</li>
            <li><strong>Threat Intelligence</strong> — AI-powered mapping of organized fraud operations</li>
            <li><strong>Fraud Network Graph</strong> — Expose coordinated fraud rings through force-directed graph analysis</li>
            <li><strong>Crime Heatmap</strong> — Geospatial crime density visualization for Indian cities</li>
            <li><strong>Scam Trends &amp; Analytics</strong> — Emerging scam patterns, regional data, and financial loss analytics</li>
          </ul>
          <h2 style="font-size:1.3rem;margin-top:32px;margin-bottom:12px;">Why RAKSHA AI?</h2>
          <p style="font-size:1rem;line-height:1.7;color:#a1a1aa;">Digital arrest scams cost Indian families ₹1,031.9 crore in 2024 alone. RAKSHA AI combines multi-agent AI analysis, real-time threat detection, and citizen protection tools to combat the growing wave of cybercrime targeting Indian citizens.</p>
          <p style="margin-top:32px;font-size:0.85rem;color:#52525b;">Built with React, TypeScript, and AI. Open-source digital public safety platform.</p>
